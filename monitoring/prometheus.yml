global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'kira-ledger-local'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
    # host.docker.internal resolves to the Mac/Linux host from inside Docker
    # so Prometheus reaches the Spring Boot app running on localhost:8080

  # Uncomment to also scrape the live Railway deployment:
  # - job_name: 'kira-ledger-railway'
  #   metrics_path: '/actuator/prometheus'
  #   scheme: https
  #   static_configs:
  #     - targets: ['kira-ledger-production.up.railway.app']
